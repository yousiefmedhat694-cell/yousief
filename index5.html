<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing - Love You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d0d;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .center-text {
            position: absolute;
            color: #ffffff;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 50, 100, 0.8), 0 0 40px rgba(255, 0, 50, 0.6);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="center-text">Love you.</div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const words = ["i love you", "love you", "i love u", "i love you"];
        const particles = [];
        const particleCount = 450; 

        // معادلة رسم شكل القلب
        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                const t = Math.random() * Math.PI * 2;
                const heartPoint = getHeartPoint(t);
                
                // مقياس حجم القلب وتوسيطه
                const scale = Math.min(canvas.width, canvas.height) / 35;
                const fillFactor = Math.sqrt(Math.random()); // لتوزيع الكلمات داخل القلب وخارجه قليلاً
                
                this.targetX = canvas.width / 2 + heartPoint.x * scale * fillFactor;
                this.targetY = canvas.height / 2 + heartPoint.y * scale * fillFactor;
                
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 50;
                this.y = canvas.height / 2 + (Math.random() - 0.5) * 50;
                
                this.text = words[Math.floor(Math.random() * words.length)];
                this.fontSize = Math.floor(Math.random() * 8) + 10;
                this.speed = Math.random() * 0.03 + 0.01;
                this.opacity = Math.random() * 0.7 + 0.3;
                
                // التوهج والألوان الفوشيا والأحمر
                const colors = ['#ff2a6d', '#ff0055', '#ff5e97', '#ff1493', '#ff66b2'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }

            draw() {
                ctx.save();
                ctx.font = `${this.fontSize}px 'Courier New', monospace`;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.fillStyle = 'rgba(13, 13, 13, 0.2)'; // تأثير الذيل الناعم عند الحركة
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
